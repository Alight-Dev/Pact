name: Delete merged branches

on:
  pull_request:
    types: [closed]

jobs:
  delete_head_branch:
    # Only run when the PR was merged, and the head branch belongs to this repo
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest

    steps:
      - name: Delete branch for merged PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ref = 'heads/' + context.payload.pull_request.head.ref;
            core.info(`Deleting ref ${ref}`);
            try {
              await github.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref,
              });
            } catch (error) {
              core.warning(`Failed to delete ref ${ref}: ${error.message}`);
            }

